name: Feature Request
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your ideas! Describe the feature and why it would be useful.
  - type: input
    id: package
    attributes:
      label: Package
      description: Which package does this relate to? (or "new" for a new package)
      placeholder: "@effectorhq/core"
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives have you considered?
