name: Bug Report
description: Report a bug in an effectorHQ package
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: input
    id: package
    attributes:
      label: Package
      description: Which @effectorhq package is affected?
      placeholder: "@effectorhq/core"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you using?
      placeholder: "1.0.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug
      placeholder: |
        1. Run `npx @effectorhq/core validate .`
        2. See error...
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.0.0"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.3"
